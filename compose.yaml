name: forestudy

services:
  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-forestudy}
      POSTGRES_USER: ${POSTGRES_USER:-forestudy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  backend:
    build:
      context: .
      target: backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-forestudy}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-forestudy}
      SQLITE_DATABASE_PATH: /app/data/forestudy.db
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - backend_data:/app/data
      - uploads_data:/app/backend/uploads
    restart: unless-stopped

  frontend:
    build:
      context: .
      target: frontend
      args:
        VITE_API_BASE_URL: ""
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    restart: unless-stopped

volumes:
  postgres_data:
  backend_data:
  uploads_data:
